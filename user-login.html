<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    input {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #f1f1f1;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
    }

    .create-btn {
      background: linear-gradient(45deg, #00ff87, #00c9ff);
    }
  </style>

</head>

<body>

<div class="container">

<h2>🚀 Welcome</h2>

<input type="text" id="username" placeholder="Username">
<input type="text" id="number" placeholder="Phone Number">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm Password">

<button class="create-btn" onclick="createAccount()">Create Account</button>
<button onclick="login()">Login</button>

</div>

<script>
function createAccount(){
  let username = document.getElementById("username").value;
  let number = document.getElementById("number").value;
  let password = document.getElementById("password").value;
  let confirmPassword = document.getElementById("confirmPassword").value;

  if(username=="" || number=="" || password=="" || confirmPassword==""){
    alert("Fill all fields");
    return;
  }

  if(password !== confirmPassword){
    alert("Password not match");
    return;
  }

  localStorage.setItem("username", username);
  localStorage.setItem("user", number);
  localStorage.setItem("password", password);

  alert("Account Created সফল ✅");
}

function login(){
  let number = document.getElementById("number").value;
  let password = document.getElementById("password").value;

  let savedNumber = localStorage.getItem("user");
  let savedPassword = localStorage.getItem("password");

  if(number === savedNumber && password === savedPassword){
    alert("Login Success ✅");
    window.location.href = "index.html";
  } else {
    alert("Wrong number or password ❌");
  }
}
</script>

</body>
</html>
