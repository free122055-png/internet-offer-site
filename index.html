<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Internet Offer Zone</title>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

/* Glow Background */
body::before{
content:"";
position:fixed;
width:400px;
height:400px;
background:#00ffd5;
filter:blur(200px);
top:-100px;
left:-100px;
opacity:0.3;
}

/* Header */
header{text-align:center;padding:40px;}
header h1{
font-size:40px;
background:linear-gradient(90deg,#ff512f,#dd2476,#00c6ff);
-webkit-background-clip:text;
color:transparent;
}

/* Search */
.controls{text-align:center;padding:10px;}
#searchBox{
width:85%;
padding:14px;
border-radius:30px;
border:none;
background:#ffffff15;
color:white;
outline:none;
}

/* SIM BAR */
.simBar{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}
.simBtn{
padding:10px 18px;
border-radius:25px;
background:#ffffff10;
cursor:pointer;
transition:0.3s;
}
.simBtn:hover{
background:#00ffd5;
color:black;
}
.activeSIM{
background:#00ffd5;
color:black;
box-shadow:0 0 10px #00ffd5;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:20px;
}

/* Card */
.box{
background:rgba(255,255,255,0.08);
border-radius:25px;
padding:20px;
text-align:center;
backdrop-filter:blur(10px);
transition:0.4s;
position:relative;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.box:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 25px #00ffd5;
}

/* Badge */
.badge{
position:absolute;
top:10px;
right:10px;
padding:5px 10px;
border-radius:15px;
font-size:11px;
background:linear-gradient(45deg,#ff512f,#ff0000);
}

/* Text */
.gb{font-size:26px;color:#00ffd5;}
.price{font-size:22px;color:#ffcc00;}
.valid{font-size:14px;opacity:0.8;}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
transition:0.3s;
}
button:hover{
transform:scale(1.1);
}

.sectionTitle{
text-align:center;
font-size:22px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="controls">
<input type="text" id="searchBox" placeholder="🔍 Search GB / Price...">
</div>

<div class="simBar">
<div class="simBtn activeSIM" onclick="filterSIM('All',this)">All</div>
<div class="simBtn" onclick="filterSIM('এয়ারটেল',this)">এয়ারটেল</div>
<div class="simBtn" onclick="filterSIM('রবি',this)">রবি</div>
<div class="simBtn" onclick="filterSIM('গ্রামীণ',this)">গ্রামীণ</div>
<div class="simBtn" onclick="filterSIM('বাংলালিংক',this)">বাংলালিংক</div>
<div class="simBtn" onclick="filterSIM('skitto',this)">skitto</div>
<div class="simBtn" onclick="filterSIM('টেলিটক',this)">টেলিটক</div>
</div>

<div id="main"></div>

<script>

const offers = {

"এয়ারটেল":{
"Family Pack":[{name:"10GB",price:"220",validity:"30 দিন"},{name:"15GB",price:"260",validity:"30 দিন"},{name:"20GB",price:"290",validity:"30 দিন"}],
"Regular":[{name:"10GB",price:"99",validity:"30 দিন"},{name:"3GB",price:"39",validity:"30 দিন"}]
},

"রবি":{
"Family Pack":[{name:"30GB",price:"299",validity:"30 দিন"},{name:"20GB",price:"199",validity:"30 দিন"}],
"Regular":[{name:"10GB",price:"99",validity:"30 দিন"}]
},

"গ্রামীণ":{
"Family":[{name:"20GB",price:"199",validity:"30 দিন"}],
"Regular":[{name:"5GB",price:"59",validity:"30 দিন"}]
},

"বাংলালিংক":{
"Regular":[{name:"10GB",price:"99",validity:"30 দিন"}]
},

"skitto":{
"Regular":[{name:"10GB",price:"99",validity:"30 দিন"}]
},

"টেলিটক":{
"Regular":[{name:"5GB",price:"59",validity:"30 দিন"}]
}

};

let currentSIM="All";

function filterSIM(sim,el){
currentSIM=sim;
document.querySelectorAll(".simBtn").forEach(b=>b.classList.remove("activeSIM"));
el.classList.add("activeSIM");
renderOffers();
}

function renderOffers(){
let html="";
let search=document.getElementById("searchBox").value.toLowerCase();

for(let sim in offers){

if(currentSIM!=="All" && sim!==currentSIM) continue;

html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;

offers[sim][pack].forEach((o,i)=>{
let text=(o.name+o.price).toLowerCase();

if(text.includes(search)){
html+=`
<div class="box">
<div class="badge">${i==0?"BEST":"HOT"}</div>
<div class="gb">${o.name}</div>
<div class="price">${o.price}৳</div>
<div class="valid">⏳ ${o.validity}</div>
<button onclick="buy('${o.name}','${o.price}','${o.validity}')">🚀 Buy</button>
</div>
`;
}
});

html+=`</div>`;
}
}
document.getElementById("main").innerHTML=html;
}

function buy(n,p,v){
let msg=`${n} ${p}৳ ${v}`;
window.open("https://wa.me/8801624228476?text="+encodeURIComponent(msg));
}

document.getElementById("searchBox").addEventListener("input",renderOffers);

renderOffers();

</script>

</body>
</html>
