<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

/* TOP */
.topbar{text-align:center;padding:5px;font-size:14px;}
.trust{text-align:center;background:#00ffcc;color:black;padding:8px;font-weight:bold;}

header{text-align:center;padding:25px;cursor:pointer;}

.slider{text-align:center;padding:10px;background:black;font-weight:bold;}

.notice{
background:linear-gradient(90deg,#ffcc00,#ff9900);
color:black;text-align:center;padding:10px;font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;
}

.box{
background:linear-gradient(135deg,#1e3c72,#2a5298);
padding:10px;border-radius:12px;text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.price{font-weight:bold;margin-top:3px;}

button{
margin-top:5px;padding:8px 10px;border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;cursor:pointer;font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">বিসমিল্লাহির রহমানির রহিম</div>
<div class="trust">✅ বিশ্বাস আপনার, সততা আমাদের</div>

<header onclick="secretClick()">
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="slider" id="sliderText">🔥 সাশ্রয় দামে সব অফার দেখুন</div>
<div class="notice" id="noticeText">📢 প্রতিদিন নতুন অফার আপডেট করা হয়</div>

<script>
function createSIM(sim,prefix){
let packs=["Family","Gift","House","Regular","Minute"];

document.write(`<h2 style="margin-left:15px;">📶 ${sim}</h2>`);

packs.forEach((pack,index)=>{
document.write(`<h3 style="margin-left:20px;">👉 ${pack}</h3><div class="grid">`);

for(let i=1;i<=10;i++){
let id=prefix+index+i;

document.write(`
<div class="box" onclick="editOffer('${id}')">
<p id="${id}">${sim} ${pack} ${i}</p>
<p class="price" id="price${id}">0৳</p>
<button onclick="event.stopPropagation();orderNow('${id}')">Buy</button>
</div>
`);
}
document.write(`</div>`);
});
}
</script>

<script>
createSIM("Grameenphone","gp");
createSIM("Robi","r");
createSIM("Airtel","a");
createSIM("Banglalink","b");
createSIM("Teletalk","t");
</script>

<h2>🔥 All Offers</h2>
<textarea id="allOffers" style="width:95%;height:300px;margin:10px;border-radius:10px;"></textarea>

<script>
let isAdmin=false;

/* LOGIN */
let clickCount=0;
function secretClick(){
clickCount++;
if(clickCount==3){
let pass=prompt("Password");
if(pass=="122055"){
isAdmin=true;
alert("Admin Mode ON ✅");
}
clickCount=0;
}
}

/* DIRECT EDIT */
function editOffer(id){
if(!isAdmin) return;

let currentText=document.getElementById(id).innerText;
let currentPrice=document.getElementById("price"+id).innerText;

let newText=prompt("Edit Offer:",currentText);
if(newText===null) return;

let newPrice=prompt("Edit Price:",currentPrice);
if(newPrice===null) return;

document.getElementById(id).innerText=newText;
document.getElementById("price"+id).innerText=newPrice;

localStorage.setItem(id,newText);
localStorage.setItem("price"+id,newPrice);
}

/* NOTICE UPDATE */
function updateNotice(){
let n=prompt("Write Notice");
if(n){
noticeText.innerText=n;
localStorage.setItem("notice",n);
}
}

/* LOAD */
window.onload=function(){
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(document.getElementById(k)){
document.getElementById(k).innerText=localStorage.getItem(k);
}
}
if(localStorage.getItem("notice")){
noticeText.innerText=localStorage.getItem("notice");
}
loadOrders();
}

/* ORDER */
function orderNow(id){
let name=document.getElementById(id).innerText;
let price=document.getElementById("price"+id).innerText;

let full=name+" - "+price;

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(full);
localStorage.setItem("orders",JSON.stringify(orders));

window.open("https://wa.me/8801624228476?text="+encodeURIComponent("আমি নিতে চাই: "+full));

loadOrders();
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
console.log("Orders:",orders);
}

/* SLIDER */
let texts=[
"🔥 সাশ্রয় দামে সব অফার দেখুন",
"💥 ধামাকা অফার চলছে",
"🚀 নতুন প্যাক এসেছে",
"📢 নিচে সব অফার দেখুন"
];
let i=0;
setInterval(()=>{
i=(i+1)%texts.length;
sliderText.innerText=texts[i];
},2000);
</script>
