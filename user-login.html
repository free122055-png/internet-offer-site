<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Create Account</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:sans-serif;
    color:white;
}

/* Container */
.container{
    text-align:center;
}

/* Instruction */
.instruction{
    font-size:14px;
    margin-bottom:15px;
    color:#ccc;
}

/* Lamp */
.lamp{
    width:100px;
    height:120px;
    background:#333;
    border-radius:50px 50px 20px 20px;
    margin:auto;
    transition:0.5s;
}

.lamp.on{
    background:#ffe066;
    box-shadow:0 0 60px #ffe066;
}

/* Rope */
.rope{
    width:3px;
    height:80px;
    background:white;
    margin:auto;
    cursor:pointer;
}

/* Form Box */
.form-box{
    margin-top:25px;
    background:#111;
    padding:20px;
    border-radius:10px;
    width:260px;
    display:none;
}

.form-box.show{
    display:block;
    box-shadow:0 0 25px #ffe066;
}

/* Inputs */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}

/* Button */
button{
    width:100%;
    padding:10px;
    background:#ffe066;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="instruction">⬇️ নিচের ফিতা টান দিয়ে একাউন্ট খুলুন</div>

    <div class="lamp" id="lamp"></div>

    <div class="rope" onclick="toggleLight()"></div>

    <div class="form-box" id="formBox">
        <h3>Create Account</h3>

        <input type="text" id="username" placeholder="Username">

        <input type="text" id="phone" placeholder="Phone Number">

        <input type="password" id="password" placeholder="Password">

        <input type="password" id="confirmPassword" placeholder="Confirm Password">

        <button onclick="createAccount()">Create Account</button>

        <p id="msg" style="font-size:13px;"></p>
    </div>

</div>

<script>

function toggleLight(){
    let lamp = document.getElementById("lamp");
    let form = document.getElementById("formBox");

    lamp.classList.toggle("on");
    form.classList.toggle("show");
}

function createAccount(){
    let user = document.getElementById("username").value;
    let phone = document.getElementById("phone").value;
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;
    let msg = document.getElementById("msg");

    if(!user || !phone || !pass || !confirm){
        msg.style.color="red";
        msg.innerText="সব ঘর পূরণ করুন";
        return;
    }

    if(pass !== confirm){
        msg.style.color="red";
        msg.innerText="Password মিলছে না!";
        return;
    }

    msg.style.color="lightgreen";
    msg.innerText="Account Created Successfully 😎";
}

</script>

</body>
</html>
