<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* Header */
header{text-align:center;padding:30px;}
header h1{
font-size:35px;
background:linear-gradient(90deg,#ff512f,#dd2476,#00c6ff);
-webkit-background-clip:text;
color:transparent;
}

/* Search */
.controls{text-align:center;padding:10px;}
#searchBox{
width:85%;
padding:12px;
border-radius:25px;
border:none;
background:#ffffff15;
color:white;
outline:none;
}

/* SIM Bar */
.simBar{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
scrollbar-width:none;
}
.simBar::-webkit-scrollbar{display:none;}

.simBtn{
padding:10px 18px;
border-radius:25px;
background:#ffffff10;
cursor:pointer;
transition:0.3s;
}
.simBtn:hover{
background:#00ffd5;
color:black;
}
.activeSIM{
background:#00ffd5;
color:black;
box-shadow:0 0 10px #00ffd5;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.box{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:15px;
text-align:center;
transition:0.3s;
}
.box:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 15px #00ffd5;
}

.gb{font-size:22px;color:#00ffd5;}
.price{font-size:20px;color:#ffcc00;}
.valid{font-size:13px;opacity:0.8;}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
transition:0.3s;
}
button:hover{transform:scale(1.1);}

.sectionTitle{
text-align:center;
margin-top:20px;
font-size:20px;
} /* 🔥 HERO DESIGN */
.heroBox{
height:180px;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
border-radius:0 0 25px 25px;
position:relative;
overflow:hidden;
}

/* top items */
.heroItems{
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
}

.heroItems::-webkit-scrollbar{
display:none;
}

/* sim buttons */
.item{
padding:6px 12px;
border-radius:20px;
background:#ffffff20;
color:white;
cursor:pointer;
font-size:12px;
white-space:nowrap;
transition:0.3s;
}

.item:hover{
background:#00ffd5;
color:black;
}

/* center text */
.heroCenter{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.heroCenter h2{
font-size:20px;
margin:0;
background:linear-gradient(90deg,#ff512f,#00c6ff);
-webkit-background-clip:text;
color:transparent;
}

.heroCenter p{
font-size:12px;
opacity:0.8;
margin:4px 0;
}
</style>

let currentSIM="All";

function filterSIM(sim,el){
currentSIM=sim;
document.querySelectorAll(".simBtn").forEach(b=>b.classList.remove("activeSIM"));
el.classList.add("activeSIM");
renderOffers();
}

function renderOffers(){
let html="";
let search=document.getElementById("searchBox").value.toLowerCase();

for(let sim in offers){
if(currentSIM!=="All" && sim!==currentSIM) continue;

html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;

offers[sim][pack].forEach(o=>{
let text=(o.name+o.price).toLowerCase();

if(text.includes(search)){
html+=`
<div class="box">
<div class="gb">${o.name}</div>
<div class="price">${o.price}৳</div>
<div class="valid">${o.validity}</div>
<button onclick="buy('${o.name}','${o.price}','${o.validity}')">🚀 Buy</button>
</div>`;
}
});

html+=`</div>`;
}
}

document.getElementById("main").innerHTML=html;
}

function buy(n,p,v){
let msg=`${n} ${p}৳ ${v}`;
window.location.href="https://wa.me/8801624228476?text="+encodeURIComponent(msg);
}

document.getElementById("searchBox").addEventListener("input",renderOffers);

renderOffers();
