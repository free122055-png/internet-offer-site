<!DOCTYPE html><html>
<head>
  <title>Premium Auth System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      color: white;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    .link {
      margin-top: 10px;
      display: block;
      cursor: pointer;
      font-size: 14px;
      color: #ddd;
    }
  </style></head><body><div class="glass">
  <h2>✨ Premium Login</h2>  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password"><button onclick="register()">Create Account</button> <button onclick="login()">Login</button>

<span class="link" onclick="forgotPassword()">Forgot Password?</span>

</div><script>

function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

function register(){
  let username = document.getElementById("username").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!username || !email || !password){
    alert("Fill all fields");
    return;
  }

  let users = getUsers();

  let exists = users.find(u => u.email === email);
  if(exists){
    alert("Email already exists ❌");
    return;
  }

  users.push({username, email, password});
  saveUsers(users);

  alert("Account Created ✅");
}

function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let users = getUsers();

  let user = users.find(u => u.email === email && u.password === password);

  if(user){
    localStorage.setItem("session", JSON.stringify(user));
    alert("Login Success ✅");
  } else {
    alert("Wrong email or password ❌");
  }
}

function forgotPassword(){
  let email = prompt("Enter your email:");

  let users = getUsers();
  let user = users.find(u => u.email === email);

  if(user){
    let newPass = prompt("Enter new password:");
    user.password = newPass;
    saveUsers(users);
    alert("Password Reset Successful ✅");
  } else {
    alert("Email not found ❌");
  }
}

</script></body>
</html>
