<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium Light Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:Poppins, sans-serif;
    color:white;
    overflow:hidden;
}

/* Container */
.container{
    text-align:center;
    position:relative;
}

/* Instruction */
.instruction{
    font-size:13px;
    color:#ccc;
    margin-bottom:15px;
    letter-spacing:1px;
}

/* Lamp */
.lamp{
    width:100px;
    height:120px;
    background:#222;
    border-radius:50px 50px 20px 20px;
    margin:auto;
    position:relative;
    transition:0.5s;
}

/* Light effect */
.light-glow{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:200px;
    background:radial-gradient(circle, rgba(255,224,102,0.4), transparent 70%);
    opacity:0;
    transition:0.5s;
}

/* ON state */
.lamp.on{
    background:#ffe066;
    box-shadow:0 0 40px #ffe066,0 0 80px #ffe066;
}

.lamp.on + .light-glow{
    opacity:1;
}

/* Rope */
.rope{
    width:3px;
    height:80px;
    background:#fff;
    margin:auto;
    cursor:pointer;
    position:relative;
}

.rope::after{
    content:'';
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    position:absolute;
    bottom:-6px;
    left:-4px;
}

/* Login Box */
.login-box{
    position:absolute;
    right:-260px;
    top:50%;
    transform:translateY(-50%) scale(0.8);
    width:250px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    opacity:0;
    transition:0.5s;
}

/* Neon border */
.login-box.show{
    opacity:1;
    transform:translateY(-50%) scale(1);
    box-shadow:0 0 15px #ffe066,0 0 30px #ffe066;
}

/* Inputs */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    background:#222;
    color:white;
}

/* Button */
button{
    width:100%;
    padding:10px;
    background:#ffe066;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="instruction">⬇️ নিচের ফিতা টান দিন</div>

    <div class="lamp" id="lamp"></div>
    <div class="light-glow"></div>

    <div class="rope" id="rope"></div>

    <div class="login-box" id="loginBox">
        <h3>Welcome Back</h3>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

</div>

<script>
let lamp = document.getElementById("lamp");
let rope = document.getElementById("rope");
let login = document.getElementById("loginBox");

rope.addEventListener("click", () => {

    lamp.classList.toggle("on");
    login.classList.toggle("show");

});
</script>

</body>
</html>
