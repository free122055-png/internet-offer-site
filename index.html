}

/* Glow */
body::before{
content:"";
position:fixed;
width:400px;
height:400px;
background:#00ffd5;
filter:blur(200px);
top:-100px;
left:-100px;

}

/* Header */
header{text-align:center;padding:40px;}
header h1{
font-size:42px;
background:linear-gradient(90deg,#ff512f,#dd2476,#00c6ff);

}

/* Search */

#searchBox{
width:85%;
padding:14px;
border-radius:30px;
border:none;
background:#ffffff15;
color:white;
backdrop-filter:blur(10px);
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:20px;
}

/* Card */
.box{
background:rgba(255,255,255,0.07);
border-radius:25px;
padding:20px;
text-align:center;
backdrop-filter:blur(15px);
transition:0.4s;
}

.box:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px #00ffd5;
}

/* Text */
.gb{font-size:28px;color:#00ffd5;}
.price{font-size:22px;color:#ffcc00;}
.valid{font-size:14px;opacity:0.8;}

/* Button */
button{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff512f;
}

.sectionTitle{
text-align:center;
font-size:22px;

}
</style>
