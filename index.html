<!DOCTYPE html> 
<html lang="bn"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Internet Offers Premium</title> 
<style> 

/* ===== GLOBAL ===== */ 
body{ 
margin:0; 
font-family:'Poppins',sans-serif; 
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); 
color:white; 
overflow-x:hidden; 
}  

/* ===== TOP BAR ===== */ 
.topbar{ 
text-align:center; 
padding:6px; 
font-size:14px; 
opacity:0.9; 
letter-spacing:1px; 
background:rgba(0,0,0,0.2); 
backdrop-filter:blur(10px); 
} 

.trust{ 
text-align:center; 
padding:12px; 
background:rgba(0,255,200,0.08); 
backdrop-filter:blur(20px); 
color:#00ffd5; 
font-weight:bold; 
border-bottom:1px solid rgba(255,255,255,0.1); 
}  

/* ===== HERO SECTION ===== */ 
header{ 
text-align:center; 
padding:50px 20px 30px 20px; 
} 

header h1{ 
font-size:42px; 
background:linear-gradient(90deg,#ff512f,#dd2476,#00c6ff); 
-webkit-background-clip:text; 
color:transparent; 
animation:shine 5s infinite linear; 
} 

header p{ 
font-size:18px; 
opacity:0.8; 
margin-top:10px; 
} 

@keyframes shine{ 
0%{filter:hue-rotate(0deg);} 
100%{filter:hue-rotate(360deg);} 
}  

/* ===== SLIDER ===== */ 
.slider{ 
margin:20px auto; 
padding:20px; 
border-radius:25px; 
background:rgba(255,255,255,0.05); 
backdrop-filter:blur(15px); 
text-align:center; 
font-weight:bold; 
font-size:20px; 
box-shadow:0 0 30px rgba(255,0,100,0.4); 
animation:pulse 2.5s infinite; 
} 

@keyframes pulse{ 
0%{transform:scale(1);} 
50%{transform:scale(1.02);} 
100%{transform:scale(1);} 
}  

/* ===== SEARCH + FILTER ===== */ 
.controls{ 
text-align:center; 
padding:20px; 
} 

#searchBox{ 
width:90%; 
padding:14px; 
border-radius:30px; 
border:none; 
outline:none; 
background:rgba(255,255,255,0.08); 
color:white; 
font-size:16px; 
backdrop-filter:blur(10px); 
box-shadow:0 0 12px rgba(0,0,0,0.3); 
margin-bottom:15px; 
} 

.filters{ 
margin-top:10px; 
display:flex; 
justify-content:center; 
flex-wrap:wrap; 
gap:8px; 
} 

.filters button{ 
padding:10px 18px; 
border-radius:30px; 
border:none; 
cursor:pointer; 
background:rgba(255,255,255,0.1); 
color:white; 
transition:0.3s; 
font-weight:bold; 
} 

.filters button:hover{ 
background:linear-gradient(135deg,#ff512f,#dd2476); 
transform:scale(1.1); 
}  

/* ===== SECTION TITLE ===== */ 
.sectionTitle{ 
text-align:center; 
margin-top:35px; 
font-size:24px; 
font-weight:bold; 
opacity:0.95; 
}  

/* ===== GRID ===== */ 
.grid{ 
display:grid; 
grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); 
gap:20px; 
padding:20px; 
}  

/* ===== BOX ===== */ 
.box{ 
background:rgba(255,255,255,0.05); 
border:1px solid rgba(255,255,255,0.1); 
backdrop-filter:blur(25px); 
padding:20px; 
border-radius:25px; 
text-align:center; 
transition:0.4s; 
box-shadow:0 10px 30px rgba(0,0,0,0.5); 
position:relative; 
overflow:hidden; 
display:flex; 
flex-direction:column; 
gap:15px; 
} 

.box::after{ 
content:""; 
position:absolute; 
width:100%; 
height:100%; 
top:0; 
left:-100%; 
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent); 
transform:translateX(-100%); 
} 

.box:hover::after{ 
transform:translateX(100%); 
transition:0.8s; 
} 

.box:hover{ 
transform:translateY(-10px) scale(1.05); 
}  

/* ===== MB / PRICE CARD ===== */ 
.offerContent{ 
display:flex; 
justify-content:space-between; 
align-items:center; 
padding:12px 18px; 
border-radius:20px; 
background:rgba(255,255,255,0.08); 
backdrop-filter:blur(15px); 
box-shadow:0 4px 15px rgba(0,0,0,0.4); 
} 

.offerContent .mb{ 
font-weight:bold; 
font-size:18px; 
color:#00ffd5; 
} 

.offerContent .price{ 
font-weight:bold; 
font-size:18px; 
background:linear-gradient(135deg,#ff512f,#dd2476); 
-webkit-background-clip:text; 
color:transparent; 
}  

/* ===== BUTTON ===== */ 
button{ 
margin-top:12px; 
padding:12px 25px; 
border:none; 
border-radius:30px; 
background:linear-gradient(135deg,#ff512f,#dd2476); 
color:white
