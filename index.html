/* UI LOAD */
function loadOffers(){
let html="";

for(let sim in offers){
html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;

offers[sim][pack].forEach((offer)=>{
html+=`
<div class="box">
<p>${offer.name}</p>
<p class="price">${offer.price}৳</p>
<button onclick="buy('${offer.name}','${offer.price}')">Buy</button>
</div>
`;
});

html+=`</div>`;
}
}

document.getElementById("main").innerHTML=html;
}

loadOffers();

/* 📦 ALL OFFERS */

</div>
`;

/* ⭐ BEST */
function highlightBest(){
let boxes=document.querySelectorAll(".box");

boxes.forEach(box=>{
let price=parseInt(box.querySelector(".price").innerText);
if(price<=99){
box.classList.add("best");
}
});
}

function buy(name,price){
let msg=`🛒 Order\n📦 ${name}\n💰 ${price}৳`;
