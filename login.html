<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLYVeFtMS6s1sqxT5b4wrg9qAUQlMKZSo",
  authDomain: "internet-offer-b4edc.firebaseapp.com",
  databaseURL: "https://internet-offer-b4edc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "internet-offer-b4edc",
  storageBucket: "internet-offer-b4edc.firebasestorage.app",
  messagingSenderId: "662399482698",
  appId: "1:662399482698:web:ed80a09d8c04b04d7a1fb3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login Success");
      window.location.href = "admin.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
