<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  font-family:sans-serif;
}

.box{
  background:#1e1e2f;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}

h2{color:white;}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  color:white;
  font-size:15px;
}

.loginBtn{background:#00c6ff;}
.signupBtn{background:#28a745;}
</style>
</head>

<body>

<div class="box">
<h2>🔐 Login / Signup</h2>

<input type="text" id="number" placeholder="Phone Number">
<input type="password" id="password" placeholder="Password">

<button class="loginBtn" onclick="login()">Login</button>
<button class="signupBtn" onclick="signup()">Create Account</button>
</div>

<script>

function signup(){
  let number = document.getElementById("number").value;
  let password = document.getElementById("password").value;

  if(number=="" || password==""){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("user_number", number);
  localStorage.setItem("user_password", password);

  alert("Account Created!");
}

function login(){
  let number = document.getElementById("number").value;
  let password = document.getElementById("password").value;

  let savedNumber = localStorage.getItem("user_number");
  let savedPassword = localStorage.getItem("user_password");

  if(number === savedNumber && password === savedPassword){
    localStorage.setItem("user", number);
    alert("Login Success");
    window.location.href = "index.html";
  }else{
    alert("Wrong Number or Password");
  }
}

</script>

</body>
</html>
