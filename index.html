<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

header{
text-align:center;
padding:30px;
cursor:pointer;
}

.slider{
text-align:center;
padding:10px;
background:black;
font-weight:bold;
}

h2{
margin-left:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
cursor:pointer;
}
.card:hover{transform:scale(1.05);}

/* SELECTED */
.selected{
border:3px solid yellow;
}

/* COLORS */
.gp{background:#00a651;}
.robi{background:#e60000;}
.airtel{background:#ff0033;}
.bl{background:#ff6600;}
.tt{background:#008000;}

.price{
background:#000;
padding:5px 10px;
border-radius:10px;
display:inline-block;
margin-top:5px;
font-weight:bold;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:20px;
background:black;
color:white;
cursor:pointer;
}

.admin{
display:none;
background:#000;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

.history{
margin:20px;
padding:20px;
background:rgba(0,0,0,0.5);
border-radius:10px;
}
</style>
</head>

<body>

<header onclick="secretClick()">
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="slider" id="sliderText">🔥 আজকের অফার</div>

<script>
let selectedCard = null;

function createCard(id,name,price,className){
return `
<div class="card ${className}" id="${id}" onclick="selectCard('${id}')">
<p>${name}</p>
<div class="price">💰 ${price}</div>
<button onclick="orderNow('${name} - ${price}'); event.stopPropagation();">Buy</button>
</div>`;
}

function createSection(title, prefix, className){
document.write(`<h2>📶 ${title}</h2><div class="container">`);

let packs=["Family","Gift","House","Regular"];
let prices=["299৳","149৳","499৳","99৳"];

for(let i=0;i<4;i++){
document.write(createCard(prefix+(i+1),`${title} ${packs[i]}`,prices[i],className));
}

document.write(`</div>`);
}
</script>

<script>
createSection("Grameenphone","gp","gp");
createSection("Robi","r","robi");
createSection("Airtel","a","airtel");
createSection("Banglalink","b","bl");
createSection("Teletalk","t","tt");
</script>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
<h2>Admin Panel</h2>

<input id="newName" placeholder="New Offer Name">
<input id="newPrice" placeholder="New Price">
<button onclick="updateSelected()">Update Selected Offer</button>

</div>

<!-- ORDER HISTORY -->
<div class="history">
<h2>📦 Your Orders</h2>
<ul id="orderList"></ul>
</div>

<script>
let clickCount=0;

function secretClick(){
clickCount++;
if(clickCount==3){
let pass=prompt("Password:");
if(pass=="122055"){
adminPanel.style.display="block";
}else alert("Wrong!");
clickCount=0;
}
}

/* SELECT CARD */
function selectCard(id){
if(selectedCard){
document.getElementById(selectedCard).classList.remove("selected");
}
selectedCard=id;
document.getElementById(id).classList.add("selected");
}

/* UPDATE SELECTED */
function updateSelected(){
if(!selectedCard){
alert("আগে একটি offer select করুন");
return;
}

let name=document.getElementById("newName").value;
let price=document.getElementById("newPrice").value;

let card=document.getElementById(selectedCard);

card.innerHTML=`
<p>${name}</p>
<div class="price">💰 ${price}</div>
<button onclick="orderNow('${name} - ${price}'); event.stopPropagation();">Buy</button>
`;

localStorage.setItem(selectedCard, JSON.stringify({name,price}));

alert("Updated ✅");
}

/* LOAD */
window.onload=function(){
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
let data=JSON.parse(localStorage.getItem(k));
if(document.getElementById(k) && data){
let card=document.getElementById(k);
card.innerHTML=`
<p>${data.name}</p>
<div class="price">💰 ${data.price}</div>
<button onclick="orderNow('${data.name} - ${data.price}'); event.stopPropagation();">Buy</button>
`;
}
}

/* LOAD ORDERS */
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.forEach(o=>{
let li=document.createElement("li");
li.innerText=o;
orderList.appendChild(li);
});
}

/* ORDER */
function orderNow(product){
window.open("https://wa.me/8801624228476?text="+encodeURIComponent("আমি নিতে চাই: "+product));

let li=document.createElement("li");
li.innerText=product;
orderList.appendChild(li);

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(product);
localStorage.setItem("orders",JSON.stringify(orders));
}

/* SLIDER */
let texts=["🔥 আজকের অফার","💥 Special Deal","🚀 New Pack"];
let i=0;
setInterval(()=>{
i=(i+1)%texts.length;
sliderText.innerText=texts[i];
},2000);
</script>

<!-- WHATSAPP -->
<div style="margin:20px;padding:20px;text-align:center;background:#25D366;">
<h2>📲 WhatsApp</h2>
<a href="https://wa.me/8801624228476" target="_blank">
<button>Chat Now</button>
</a>
</div>

<div style="margin:20px;padding:20px;text-align:center;background:#1877F2;">
<h2>📘 Facebook</h2>
<a href="https://facebook.com/fahim12205" target="_blank">
<button>Visit Profile</button>
</a>
</div>

<!-- FOOTER -->
<div style="text-align:center;padding:20px;">
© 2026 Rajibul Islam Fahim
</div>

</body>
</html>
