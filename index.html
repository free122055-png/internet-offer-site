<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

header{
text-align:center;
padding:30px;
cursor:pointer;
}

/* SLIDER */
.slider{
text-align:center;
padding:10px;
background:black;
font-weight:bold;
}

/* NOTICE */
.notice{
background:#ffcc00;
color:black;
text-align:center;
padding:10px;
font-weight:bold;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}
.card:hover{transform:scale(1.05);}

/* SIM COLORS */
.gp{background:#00a651;}
.robi{background:#e60000;}
.airtel{background:#ff0033;}
.bl{background:#ff6600;}
.tt{background:#008000;}

.price{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:20px;
background:black;
color:white;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
background:#000;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<header onclick="secretClick()">
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="slider" id="sliderText">🔥 আজকের অফার</div>
<div class="notice" id="noticeText">📢 সব অফার দেখতে নিচে স্ক্রল করুন</div>

<!-- FUNCTION -->
<script>
function createSection(title, prefix, className){
document.write(`<h2 style="margin-left:20px;">📶 ${title}</h2><div class="container">`);

let names=["Family","Gift","House","Regular","Minute"];

for(let i=0;i<5;i++){
document.write(`
<div class="card ${className}">
<p id="${prefix}${i+1}">${title} ${names[i]} 0৳</p>
<div class="price" id="price${prefix}${i+1}">0৳</div>
<button onclick="orderNow('${prefix}${i+1}')">Buy</button>
</div>`);
}

document.write(`</div>`);
}
</script>

<script>
createSection("Grameenphone","gp","gp");
createSection("Robi","r","robi");
createSection("Airtel","a","airtel");
createSection("Banglalink","b","bl");
createSection("Teletalk","t","tt");
</script>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
<h2>Admin Panel</h2>

<input id="editId" placeholder="Offer ID (gp1, r2, a3...)">
<input id="editText" placeholder="Offer Text">
<input id="editPrice" placeholder="Price (e.g 299৳)">
<button onclick="saveData()">Update Offer</button>

<h3>Notice Update</h3>
<input id="noticeInput" placeholder="Write Notice">
<button onclick="updateNotice()">Update Notice</button>

<h3>🧾 Order List</h3>
<div id="orderList"></div>
</div>

<script>
let clickCount=0;

function secretClick(){
clickCount++;
if(clickCount==3){
let pass=prompt("Password:");
if(pass=="122055"){
adminPanel.style.display="block";
}
clickCount=0;
}
}

/* SAVE OFFER */
function saveData(){
let id=document.getElementById("editId").value;
let text=document.getElementById("editText").value;
let price=document.getElementById("editPrice").value;

if(document.getElementById(id)){
document.getElementById(id).innerText=text;
document.getElementById("price"+id).innerText=price;

localStorage.setItem(id,text);
localStorage.setItem("price"+id,price);

alert("Updated!");
}else{
alert("Wrong ID");
}
}

/* NOTICE */
function updateNotice(){
let n=document.getElementById("noticeInput").value;
document.getElementById("noticeText").innerText=n;
localStorage.setItem("notice",n);
}

/* LOAD */
window.onload=function(){
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(document.getElementById(k)){
document.getElementById(k).innerText=localStorage.getItem(k);
}
}

if(localStorage.getItem("notice")){
noticeText.innerText=localStorage.getItem("notice");
}

loadOrders();
}

/* ORDER SYSTEM */
function orderNow(id){
let product=document.getElementById(id).innerText;
let price=document.getElementById("price"+id).innerText;

let full=product+" - "+price;

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(full);
localStorage.setItem("orders",JSON.stringify(orders));

window.open("https://wa.me/8801624228476?text="+encodeURIComponent("আমি নিতে চাই: "+full));

loadOrders();
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
let html="";
orders.forEach(o=>{
html+="<p>"+o+"</p>";
});
document.getElementById("orderList").innerHTML=html;
}

/* SLIDER */
let texts=[
"🔥 আজকের অফার",
"💥 ধামাকা অফার",
"🚀 নতুন প্যাক এসেছে",
"📢 সব অফার দেখতে নিচে স্ক্রল করুন"
];

let i=0;
setInterval(()=>{
i=(i+1)%texts.length;
sliderText.innerText=texts[i];
},2000);
</script>

<h2>📲 WhatsApp</h2>

<button>Chat Now</button>
</a>
</div>

</a>
</div>

</div>

</body>
</html>
