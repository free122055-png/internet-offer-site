<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers Premium</title>
<style>
/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

/* ===== TOP BAR ===== */
.topbar{
text-align:center;
padding:6px;
font-size:14px;
opacity:0.9;
letter-spacing:1px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}
.trust{
text-align:center;
padding:12px;
background:rgba(0,255,200,0.08);
backdrop-filter:blur(20px);
color:#00ffd5;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ===== HERO BANNER ===== */
header{
text-align:center;
padding:50px 20px 40px 20px;
position:relative;
overflow:hidden;
}
header::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
animation:rotateBg 15s linear infinite;
}
@keyframes rotateBg{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
header h1{
font-size:46px;
background:linear-gradient(90deg,#ff512f,#dd2476,#00c6ff);
-webkit-background-clip:text;
color:transparent;
animation:shine 5s infinite linear;
z-index:1;
position:relative;
}
header p{
font-size:18px;
opacity:0.8;
margin-top:10px;
z-index:1;
position:relative;
}
header .cta{
display:inline-block;
margin-top:20px;
padding:15px 35px;
border-radius:35px;
font-weight:bold;
font-size:18px;
color:white;
background:linear-gradient(135deg,#ff512f,#dd2476);
text-decoration:none;
transition:0.3s;
}
header .cta:hover{
transform:scale(1.1);
background:linear-gradient(135deg,#00c6ff,#0072ff);
}
@keyframes shine{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

/* ===== SLIDER ===== */
.slider{
margin:20px auto;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
text-align:center;
font-weight:bold;
font-size:20px;
box-shadow:0 0 30px rgba(255,0,100,0.4);
animation:pulse 2.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.02);}
100%{transform:scale(1);}
}

/* ===== SEARCH + FILTER ===== */
.controls{
text-align:center;
padding:20px;
}
#searchBox{
width:90%;
padding:14px;
border-radius:30px;
border:none;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
backdrop-filter:blur(10px);
box-shadow:0 0 12px rgba(0,0,0,0.3);
margin-bottom:15px;
}
.filters{
margin-top:10px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
}
.filters button{
padding:10px 18px;
border-radius:30px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
transition:0.3s;
font-weight:bold;
}
.filters button:hover{
background:linear-gradient(135deg,#ff512f,#dd2476);
transform:scale(1.1);
}

/* ===== SECTION TITLE ===== */
.sectionTitle{
text-align:center;
margin-top:35px;
font-size:24px;
font-weight:bold;
opacity:0.95;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* ===== BOX ===== */
.box{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
padding:20px;
border-radius:25px;
text-align:center;
transition:0.4s;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
gap:15px;
}
.box::after{
content:"";
position:absolute;
width:100%;
height:100%;
top:0;
left:-100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
transform:translateX(-100%);
}
.box:hover::after{
transform:translateX(100%);
transition:0.8s;
}
.box:hover{
transform:translateY(-10px) scale(1.05);
}

/* ===== MB / PRICE CARD ===== */
.offerContent{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 4px 15px rgba(0,0,0,0.4);
transition:0.3s;
}
.offerContent .mb{
font-weight:bold;
font-size:18px;
color:#00ffd5;
}
.offerContent .price{
font-weight:bold;
font-size:18px;
background:linear-gradient(135deg,#ff512f,#dd2476);
-webkit-background-clip:text;
color:transparent;
}

/* ===== BUTTON ===== */
button{
margin-top:12px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
}
button:hover{
transform:scale(1.1);
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* ===== NOTICE ===== */
.notice{
margin:30px;
padding:20px;
border-radius:25px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
text-align:center;
border:1px solid rgba(255,255,255,0.1);
font-size:16px;
}

/* ===== BEST ===== */
.best{
border:3px solid gold;
box-shadow:0 0 25px gold;
}
.best::before{
content:"🔥 BEST";
position:absolute;
top:-12px;
left:-12px;
background:gold;
color:black;
padding:5px 10px;
font-size:13px;
border-radius:8px;
font-weight:bold;
}

/* ===== FEATURED SLIDER ===== */
#featuredOffers{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
overflow:hidden;
position:relative;
}
.featuredBox{
min-width:220px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:25px;
padding:20px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
transition:0.4s;
}
.featuredBox:hover{
transform:scale(1.05);
}

/* ===== MOBILE ===== */
@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
header h1{font-size:32px;}
.sectionTitle{font-size:20px;}
.offerContent{
flex-direction:column;
gap:8px;
}
#featuredOffers{
flex-direction:column;
}
.featuredBox{
min-width:100%;
}
}

/* 🔥 NEW PREMIUM SECTION STYLE */
.superSection{
margin:50px 20px;
padding:30px;
border-radius:30px;
background:linear-gradient(135deg,#ff512f,#dd2476,#00c6ff);
background-size:300% 300%;
animation:gradientMove 6s ease infinite;
box-shadow:0 0 40px rgba(255,0,100,0.6);
text-align:center;
}
@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.noticePremium{
margin:50px 20px;
padding:30px;
border-radius:30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
position:relative;
overflow:hidden;
}
.noticePremium::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
animation:shineMove 3s infinite;
}
@keyframes shineMove{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}
</style>
</head>
<body>

<!-- 🔥 এখানে তোর আগের সব HTML + JS unchanged থাকবে -->

<!-- 🌟 NEW ADD ONLY -->
<div class="superSection">
<h2>📦 সমস্ত অফার</h2>
<div class="grid">
<!-- 👉 এখানে তুই ২০০ অফার বসাবি -->
</div>
</div>

<div class="noticePremium">
<h2>📢 জরুরি নোটিশ</h2>
<p>👉 এখানে সব গুরুত্বপূর্ণ নোটিশ দিবি</p>
</div>

</body>
</html>
