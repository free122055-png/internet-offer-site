<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

header{
text-align:center;
padding:30px;
cursor:pointer;
}

.slider{
text-align:center;
padding:10px;
background:black;
font-weight:bold;
}

h2{
margin-left:20px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}
.card:hover{transform:scale(1.05);}

/* SIM COLORS */
.gp{background:#00a651;}
.robi{background:#e60000;}
.airtel{background:#ff0033;}
.bl{background:#ff6600;}
.tt{background:#008000;}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:20px;
background:black;
color:white;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
background:#000;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<header onclick="secretClick()">
<h1>🔥 Internet Offer Zone</h1>
<p>(৩ বার চাপ দিলে admin login 😉)</p>
</header>

<div class="slider" id="sliderText">🔥 আজকের অফার</div>

<!-- SIM SECTION FUNCTION COPY STYLE -->

<script>
function createSection(title, prefix, className){
document.write(`<h2>📶 ${title}</h2><div class="container">`);
for(let i=1;i<=4;i++){
document.write(`
<div class="card ${className}">
<p id="${prefix}${i}">${title} Offer ${i}</p>
<button onclick="orderNow(${prefix}${i}.innerText)">Buy</button>
</div>`);
}
document.write(`</div>`);
}
</script>

<script>
createSection("Grameenphone","gp","gp");
createSection("Robi","r","robi");
createSection("Airtel","a","airtel");
createSection("Banglalink","b","bl");
createSection("Teletalk","t","tt");
</script>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
<h2>Admin Panel</h2>

<p>Example: gp1 = GP Family Offer</p>

<input id="key" placeholder="ID (gp1, r1, a1 etc)">
<input id="value" placeholder="New Offer">
<button onclick="saveData()">Save</button>

</div>

<script>
let clickCount=0;

function secretClick(){
clickCount++;
if(clickCount==3){
let pass=prompt("Password:");
if(pass=="122055"){
adminPanel.style.display="block";
}else alert("Wrong Password!");
clickCount=0;
}
}

/* SAVE */
function saveData(){
let k=document.getElementById("key").value;
let v=document.getElementById("value").value;

if(document.getElementById(k)){
document.getElementById(k).innerText=v;
localStorage.setItem(k,v);
alert("Updated!");
}else{
alert("Wrong ID");
}
}

/* LOAD */
window.onload=function(){
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(document.getElementById(k)){
document.getElementById(k).innerText=localStorage.getItem(k);
}
}
}

/* WHATSAPP ORDER */
function orderNow(product){
window.open("https://wa.me/8801624228476?text="+encodeURIComponent("আমি নিতে চাই: "+product));
}

/* SLIDER */
let texts=["🔥 আজকের অফার","💥 Special Deal","🚀 New Pack"];
let i=0;
setInterval(()=>{
i=(i+1)%texts.length;
sliderText.innerText=texts[i];
},2000);
</script>

<!-- WHATSAPP -->
<div style="margin:20px;padding:20px;text-align:center;background:#25D366;">
<h2>📲 WhatsApp</h2>
<a href="https://wa.me/8801624228476" target="_blank">
<button>Chat Now</button>
</a>
</div>

<!-- FACEBOOK -->
<div style="margin:20px;padding:20px;text-align:center;background:#1877F2;">
<h2>📘 Facebook</h2>
<a href="https://facebook.com/fahim12205" target="_blank">
<button>Visit Profile</button>
</a>
</div>

<!-- FOOTER -->
<div style="text-align:center;padding:20px;">
© 2026 Rajibul Islam Fahim
</div>

</body>
</html>
