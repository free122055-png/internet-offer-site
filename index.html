<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

.topbar{text-align:center;padding:5px;font-size:14px;}
.trust{text-align:center;background:#00ffcc;color:black;padding:8px;font-weight:bold;}

header{text-align:center;padding:25px;cursor:pointer;}

.slider{text-align:center;padding:10px;background:black;font-weight:bold;}

.notice{
background:linear-gradient(90deg,#ffcc00,#ff9900);
color:black;text-align:center;padding:10px;font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;
}

.box{
background:linear-gradient(135deg,#1e3c72,#2a5298);
padding:10px;border-radius:12px;text-align:center;
}

.price{font-weight:bold;}

button{
margin-top:5px;
padding:8px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
}

/* ADMIN PANEL */
.admin{
display:none;
background:black;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">বিসমিল্লাহির রহমানির রহিম</div>
<div class="trust">✅ বিশ্বাস আপনার, সততা আমাদের</div>

<header onclick="login()">
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="slider">🔥 সাশ্রয় দামে সব অফার দেখুন</div>
<div class="notice">📢 প্রতিদিন নতুন অফার আপডেট করা হয়</div>

<div id="main"></div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
<h3>Admin Panel</h3>
<input id="idInput" placeholder="Offer ID (gp01, r12...)">
<input id="nameInput" placeholder="Offer Name">
<input id="priceInput" placeholder="Price">
<button onclick="updateOffer()">Update</button>
</div>

<script>
let isAdmin=false;

/* LOGIN */
function login(){
let pass=prompt("Password:");
if(pass==="122055"){
isAdmin=true;
document.getElementById("adminPanel").style.display="block";
alert("Admin ON");
}else{
alert("Wrong Password");
}
}

/* CREATE */
function createSIM(sim,prefix){
let packs=["Family","Gift","House","Regular","Minute"];
let html=`<h2>${sim}</h2>`;

packs.forEach((pack,pIndex)=>{
html+=`<h3>${pack}</h3><div class="grid">`;

for(let i=1;i<=10;i++){
let id=prefix+pIndex+i;

html+=`
<div class="box">
<p id="${id}">${sim} ${pack} ${i}</p>
<p class="price" id="price${id}">0৳</p>
<button onclick="buy('${id}')">Buy</button>
</div>
`;
}

html+=`</div>`;
});

return html;
}

document.getElementById("main").innerHTML=
createSIM("Grameenphone","gp")+
createSIM("Robi","r")+
createSIM("Airtel","a")+
createSIM("Banglalink","b")+
createSIM("Teletalk","t");

/* UPDATE OFFER */
function updateOffer(){
let id=idInput.value;
let name=nameInput.value;
let price=priceInput.value;

if(!document.getElementById(id)){
alert("Wrong ID");
return;
}

document.getElementById(id).innerText=name;
document.getElementById("price"+id).innerText=price;

localStorage.setItem(id,name);
localStorage.setItem("price"+id,price);

alert("Updated");
}

/* LOAD */
window.onload=function(){
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(document.getElementById(k)){
document.getElementById(k).innerText=localStorage.getItem(k);
}
}
}

/* BUY */
function buy(id){
let name=document.getElementById(id).innerText;
let price=document.getElementById("price"+id).innerText;

window.open("https://wa.me/8801624228476?text="+encodeURIComponent(name+" - "+price));
}
</script>

</body>
</html>
