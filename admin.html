<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<input type="text" id="name" placeholder="Offer Name"><br><br>
<input type="text" id="price" placeholder="Price"><br><br>

<button onclick="addData()">Add Offer</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLYVeFtMS6s1sqxT5b4wrg9qAUQlMKZSo",
  authDomain: "internet-offer-b4edc.firebaseapp.com",
  databaseURL: "https://internet-offer-b4edc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "internet-offer-b4edc",
  storageBucket: "internet-offer-b4edc.firebasestorage.app",
  messagingSenderId: "662399482698",
  appId: "1:662399482698:web:ed80a09d8c04b04d7a1fb3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addData = function() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  push(ref(db, "offers"), {
    name: name,
    price: price
  });

  alert("Data Added!");
}
</script>

</body>
</html>
