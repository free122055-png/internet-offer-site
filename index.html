<script>

const offers = {
"Airtel":createSIM(),
"Grameenphone":createSIM(),
"Robi":createSIM(),
"Banglalink":createSIM(),
"Teletalk":createSIM(),
"Skitto":createSIM()
};

function createSIM(){
return {
"Family Pack":createPack(),
"Gift Pack":createPack(),
"House Offer":createPack(),
"Regular Pack":createPack(),
"Minute Offer":createPack()
};
}

function createPack(){
return {
"Section 1":[{name:"30GB",price:"299"}],
"Section 2":[{name:"20GB",price:"199"}],
"Section 3":[{name:"10GB",price:"99"}],
"Section 4":[{name:"5GB",price:"49"}],
"Section 5":[{name:"3GB",price:"29"}]
};
}

let currentSIM="All";

function renderOffers(){
let html="";
let search=document.getElementById("searchBox")?.value?.toLowerCase() || "";

for(let sim in offers){
if(currentSIM!=="All" && sim!==currentSIM) continue;

html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){

// ✅ MAIN SECTION TITLE + NOTICE
html+=`
<div class="sectionTitle">${pack}</div>

<div style="margin:10px 20px;padding:10px;border-radius:15px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);text-align:center;border:1px solid rgba(255,255,255,0.1);font-size:14px;">
⚠️ এই ${pack} নির্দিষ্ট SIM এর জন্য <br>
⏳ কিছু অফার মাসে ১ বার পাওয়া যায়
</div>
`;

// ✅ SUB SECTIONS
for(let sub in offers[sim][pack]){

html+=`<div class="sectionTitle">${sub}</div><div class="grid">`;

offers[sim][pack][sub].forEach((offer)=>{

let text=(offer.name+offer.price).toLowerCase();

if(text.includes(search)){
html+=`<div class="box">
<div class="offerContent">
<span class="mb">${offer.name}</span>
<span class="price">${offer.price}৳</span>
</div>
<button onclick="buy('${offer.name}','${offer.price}')">Buy</button>
</div>`;
}

});

html+=`</div>`;
}

}
}

document.getElementById("main").innerHTML=html;
}

function filterSIM(sim){
currentSIM=sim;
renderOffers();
}

function buy(name,price){
let msg=`🛒 Order\n📦 ${name}\n💰 ${price}৳`;
window.open("https://wa.me/8801624228476?text="+encodeURIComponent(msg));
}

document.getElementById("searchBox").addEventListener("input", renderOffers);

renderOffers();

</script>
