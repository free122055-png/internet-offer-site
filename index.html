// সব দেখাবে
function renderOffers(){
let html="";
for(let sim in offers){
html+=`<div class="sectionTitle">${sim}</div>`;
for(let pack in offers[sim]){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;
offers[sim][pack].forEach((o)=>{
html+=`<div class="box">${o.name} - ${o.price}৳<br>⏳ ${o.validity}<br><button onclick="buy('${o.name}','${o.price}','${o.validity}')">Buy</button></div>`;
});
html+=`</div>`;
}
}
document.getElementById("main").innerHTML=html;
}

// filter
function filterSIM(sim){
if(sim==="All"){renderOffers();return;}
let html="";
let s=offers[sim];
html+=`<div class="sectionTitle">${sim}</div>`;
for(let pack in s){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;
s[pack].forEach((o)=>{
html+=`<div class="box">${o.name} - ${o.price}৳<br>⏳ ${o.validity}<br><button onclick="buy('${o.name}','${o.price}','${o.validity}')">Buy</button></div>`;
});
html+=`</div>`;
}
document.getElementById("main").innerHTML=html;
}

function buy(n,p,v){
let msg=`${n} ${p}৳ ${v}`;
window.open("https://wa.me/8801624228476?text="+encodeURIComponent(msg));
}
