<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Website</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}

.sectionTitle{
  margin:15px;
  font-size:20px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  padding:10px;
}

.box{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.offerContent{
  display:flex;
  justify-content:space-between;
}

button{
  margin-top:5px;
  padding:5px;
  width:100%;
  border:none;
  border-radius:5px;
  background:#00f2fe;
}

/* 🔥 NEW SECTIONS */
.charge-guide,.notice,.facebook,.all-offers{
  margin:15px;
  padding:15px;
  border-radius:10px;
}

.charge-guide{background:#111827;border-left:4px solid #00f2fe;}
.notice{background:#1f2937;border-left:4px solid yellow;}
.facebook{background:#1877f2;text-align:center;}
.facebook a{color:#fff;text-decoration:none;font-weight:bold;}
.all-offers{background:#020617;}
</style>

</head>
<body>

<div id="main"></div>

<!-- 🔼 Charge Guide -->
<div class="charge-guide">
<h3>💳 অফার কেনার নিয়ম</h3>
<p>
১. অফার সিলেক্ট করুন<br>
২. Buy ক্লিক করুন<br>
৩. নাম্বার দিন<br>
৪. চার্জ কনফার্ম করুন<br><br>
⚠️ ভুল নাম্বার দিলে অফার যাবে না<br>
✅ সব অফার কাজ করে
</p>
</div>

<!-- 🔽 সমস্ত অফার -->
<div class="all-offers">
<h2>📦 সমস্ত অফার</h2>
<div id="allOffers"></div>
</div>

<!-- 🔽 Notice -->
<div class="notice">
<h2>📢 নোটিশ</h2>
<p>
👉 প্রতিদিন নতুন অফার আপডেট হয়<br>
👉 সমস্যা হলে যোগাযোগ করুন
</p>
</div>

<!-- 🔽 Facebook -->
<div class="facebook">
<h2>🌐 Facebook</h2>
<a href="https://www.facebook.com/fahim12205" target="_blank">
Visit Profile
</a>
</div>

<script>

// 🔥 6 section + 6 offer system
function createOffers(){
let packs={};
let packNames=["Family Pack","Gift Pack","Regular Pack","House Offer","Minute Offer","Special Offer"];

packNames.forEach(pack=>{
  packs[pack]=[];
  for(let i=1;i<=6;i++){
    packs[pack].push({
      name:i*5+"GB",
      price:(i*20)+"৳"
    });
  }
});
return packs;
}

const offers={
  "GP":createOffers(),
  "Robi":createOffers(),
  "Airtel":createOffers(),
  "BL":createOffers()
};

// 🔥 Render SIM Offers
function renderOffers(){
let html="";

for(let sim in offers){

html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){

html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;

offers[sim][pack].forEach(o=>{
html+=`
<div class="box">
<div class="offerContent">
<span>${o.name}</span>
<span>${o.price}</span>
</div>
<button onclick="buy()">Buy</button>
</div>`;
});

html+=`</div>`;
}
}

document.getElementById("main").innerHTML=html;
}

renderOffers();

// 🔥 Buy Function
function buy(){
alert("অফার প্রসেস হচ্ছে...");
}

// 🔥 200 Offers Section
let allOffers=[];
for(let i=1;i<=200;i++){
allOffers.push({name:i+"GB",price:(i*5)+"৳"});
}

function renderAll(){
let html="";
allOffers.forEach(o=>{
html+=`
<div class="box">
<div class="offerContent">
<span>${o.name}</span>
<span>${o.price}</span>
</div>
</div>`;
});
document.getElementById("allOffers").innerHTML=html;
}

renderAll();

</script>

</body>
</html>
