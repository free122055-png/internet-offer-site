<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container {
  width: 90%;
  max-width: 350px;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 30px rgba(0,255,255,0.2);
  text-align: center;
  color: white;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  outline: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(45deg, #00ffcc, #0099ff);
}

.create-btn {
  background: linear-gradient(45deg, #00ff87, #00c9ff);
}
</style>
</head>
<body>

<div class="container">

<h2>🚀 Welcome</h2>

<input type="text" id="username" placeholder="👤 Username">
<input type="text" id="number" placeholder="📱 Phone Number">
<input type="password" id="password" placeholder="🔒 Password">
<input type="password" id="confirmPassword" placeholder="🔐 Confirm Password">

<button class="create-btn" onclick="createAccount()">Create Account</button>
<button onclick="login()">Login</button>

</div>
<script>
function createAccount(){
  let username = document.getElementById("username").value;
  let number = document.getElementById("number").value;
  let password = document.getElementById("password").value;
  let confirmPassword = document.getElementById("confirmPassword").value;

  if(username=="" || number=="" || password=="" || confirmPassword==""){
    alert("Fill all fields");
    return;
  }

  if(password !== confirmPassword){
    alert("Password not match");
    return;
  }

  localStorage.setItem("username", username);
  localStorage.setItem("user", number);
  localStorage.setItem("password", password);

  alert("Account Created সফল ✅");
}

function login(){
  let number = document.getElementById("number").value;
  let password = document.getElementById("password").value;

  let savedNumber = localStorage.getItem("user");
  let savedPassword = localStorage.getItem("password");

  if(number === savedNumber && password === savedPassword){
    alert("Login Success ✅");
    window.location.href = "index.html";
  } else {
    alert("Wrong number or password ❌");
  }
}
</script>

</body>
</html>
