<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:25px;
cursor:pointer;
}

/* SLIDER */
.slider{
text-align:center;
padding:10px;
background:black;
font-weight:bold;
}

/* NOTICE */
.notice{
background:#ffcc00;
color:black;
text-align:center;
padding:10px;
font-weight:bold;
}

/* SECTION TITLE */
h2{
margin-left:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* SMALL BOX */
.box{
background:black;
padding:10px;
border-radius:10px;
text-align:center;
}

/* BUTTON */
button{
margin-top:5px;
padding:6px;
border:none;
border-radius:15px;
background:#222;
color:white;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
background:black;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<header onclick="secretClick()">
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="slider" id="sliderText">🔥 আজকের অফার</div>
<div class="notice" id="noticeText">📢 নিচে সব অফার দেখুন</div>

<!-- CREATE SYSTEM -->
<script>
function createSIM(sim,prefix){
let packs=["Family","Gift","House","Regular","Minute"];

document.write(`<h2>📶 ${sim}</h2>`);

packs.forEach((pack,index)=>{
document.write(`<h3 style="margin-left:20px;">👉 ${pack}</h3><div class="grid">`);

for(let i=1;i<=10;i++){
let id=prefix+index+i;

document.write(`
<div class="box" onclick="editOffer('${id}')">
<p id="${id}">${sim} ${pack} ${i}</p>
<p id="price${id}">0৳</p>
<button onclick="event.stopPropagation();orderNow('${id}')">Buy</button>
</div>
`);
}

document.write(`</div>`);
});
}
</script>

<script>
createSIM("Grameenphone","gp");
createSIM("Robi","r");
createSIM("Airtel","a");
createSIM("Banglalink","b");
createSIM("Teletalk","t");
</script>

<!-- ALL OFFERS LARGE SECTION -->
<h2>🔥 All Offers</h2>
<textarea id="allOffers" style="width:95%;height:200px;margin:10px;border-radius:10px;"></textarea>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
<h2>Admin Panel</h2>

<input id="newText" placeholder="New Offer Name">
<input id="newPrice" placeholder="New Price">

<button onclick="updateOffer()">Update Selected</button>

<h3>Notice</h3>
<input id="noticeInput">
<button onclick="updateNotice()">Update Notice</button>

<h3>🧾 Orders</h3>
<div id="orderList"></div>
</div>

<script>
let selectedId=null;

/* SECRET LOGIN */
let clickCount=0;
function secretClick(){
clickCount++;
if(clickCount==3){
let pass=prompt("Password");
if(pass=="122055"){
adminPanel.style.display="block";
}
clickCount=0;
}
}

/* SELECT OFFER */
function editOffer(id){
selectedId=id;
alert("Selected: "+id);
}

/* UPDATE OFFER */
function updateOffer(){
if(!selectedId) return alert("Select offer first");

let text=document.getElementById("newText").value;
let price=document.getElementById("newPrice").value;

document.getElementById(selectedId).innerText=text;
document.getElementById("price"+selectedId).innerText=price;

localStorage.setItem(selectedId,text);
localStorage.setItem("price"+selectedId,price);
}

/* NOTICE */
function updateNotice(){
let n=document.getElementById("noticeInput").value;
noticeText.innerText=n;
localStorage.setItem("notice",n);
}

/* LOAD */
window.onload=function(){
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(document.getElementById(k)){
document.getElementById(k).innerText=localStorage.getItem(k);
}
}
if(localStorage.getItem("notice")){
noticeText.innerText=localStorage.getItem("notice");
}
loadOrders();
}

/* ORDER SYSTEM */
function orderNow(id){
let name=document.getElementById(id).innerText;
let price=document.getElementById("price"+id).innerText;

let full=name+" - "+price;

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(full);
localStorage.setItem("orders",JSON.stringify(orders));

window.open("https://wa.me/8801624228476?text="+encodeURIComponent("আমি নিতে চাই: "+full));

loadOrders();
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
let html="";
orders.forEach(o=> html+="<p>"+o+"</p>");
document.getElementById("orderList").innerHTML=html;
}

/* SLIDER */
let texts=[
"🔥 আজকের অফার",
"💥 ধামাকা অফার",
"📢 নিচে সব অফার দেখুন"
];
let i=0;
setInterval(()=>{
i=(i+1)%texts.length;
sliderText.innerText=texts[i];
},2000);
</script>

<!-- CONTACT -->
<div style="margin:20px;text-align:center;background:#25D366;padding:15px;">
<a href="https://wa.me/8801624228476"><button>WhatsApp</button></a>
</div>

</div>

<div style="text-align:center;padding:20px;">
© Rajibul Islam Fahim
</div>

</body>
</html>
