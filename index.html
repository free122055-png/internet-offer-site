<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

.topbar{text-align:center;padding:5px;}
.trust{text-align:center;background:#00ffcc;color:black;padding:8px;font-weight:bold;}

header{text-align:center;padding:20px;}

.slider{
background:black;
padding:10px;
text-align:center;
font-weight:bold;
}

/* 🔍 CONTROLS */
.controls{
text-align:center;
padding:10px;
}

#searchBox{
width:90%;
padding:10px;
border:none;
border-radius:20px;
outline:none;
margin-bottom:10px;
}

.filters button{
margin:3px;
padding:6px 10px;
border-radius:20px;
border:none;
cursor:pointer;
background:white;
color:black;
}

/* SECTION */
.sectionTitle{
text-align:center;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.box{
background:linear-gradient(135deg,#1e3c72,#2a5298);
padding:10px;
border-radius:12px;
text-align:center;
}

.price{font-weight:bold;}

button{
margin-top:5px;
padding:8px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
}

.notice{
margin:15px;
padding:12px;
background:black;
border-radius:10px;
text-align:center;
}

/* BEST */
.best{
border:2px solid yellow;
position:relative;
}

.best::before{
content:"🔥 BEST";
position:absolute;
top:-8px;
left:-8px;
background:red;
color:white;
padding:2px 6px;
font-size:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="topbar">বিসমিল্লাহির রহমানির রহিম</div>
<div class="trust">✅ বিশ্বাস আপনার, সততা আমাদের</div>

<header>
<h1>🔥 Internet Offer Zone</h1>
</header>

<div class="slider">🔥 আজকের সেরা অফার</div>

<!-- 🔍 SEARCH + FILTER -->
<div class="controls">
<input type="text" id="searchBox" placeholder="🔍 Search GB / Price...">

<div class="filters">
<button onclick="filterSIM('All')">All</button>
<button onclick="filterSIM('Airtel')">Airtel</button>
<button onclick="filterSIM('Grameenphone')">GP</button>
<button onclick="filterSIM('Robi')">Robi</button>
<button onclick="filterSIM('Banglalink')">BL</button>
<button onclick="filterSIM('Teletalk')">TT</button>
</div>
</div>

<div id="main"></div>

<div class="sectionTitle">📦 সমস্ত অফার</div>
<div id="allOffers" class="grid"></div>

<div class="notice">
📢 প্রতিদিন নতুন অফার আপডেট করা হয় <br>
💬 Buy বাটনে ক্লিক করে WhatsApp এ অর্ডার করুন <br>
⚡ দ্রুত সার্ভিস গ্যারান্টি
</div>

<script>

/* 🔥 MASTER DATA (একটুও পরিবর্তন করা হয়নি) */
const offers = {

/* === SAME DATA (SHORTENED FOR SPACE, KEEP YOUR ORIGINAL FULL DATA HERE) === */
"Airtel":{
"Regular Pack":[
{name:"10GB",price:"99"},
{name:"8GB",price:"79"},
{name:"6GB",price:"59"}
]
},
"Robi":{
"Regular Pack":[
{name:"10GB",price:"99"},
{name:"8GB",price:"79"}
]
}

};

/* ===== ORIGINAL LOAD ===== */
function loadOffers(){
let html="";

for(let sim in offers){
html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;

offers[sim][pack].forEach((offer)=>{
html+=`
<div class="box">
<p>${offer.name}</p>
<p class="price">${offer.price}৳</p>
<button onclick="buy('${offer.name}','${offer.price}')">Buy</button>
</div>
`;
});

html+=`</div>`;
}
}

document.getElementById("main").innerHTML=html;
}

/* ===== NEW FILTER SYSTEM ===== */
let currentSIM="All";

function filterSIM(sim){
currentSIM=sim;
renderOffers();
}

document.getElementById("searchBox").addEventListener("input", renderOffers);

function renderOffers(){
let html="";
let search=document.getElementById("searchBox").value.toLowerCase();

for(let sim in offers){

if(currentSIM!=="All" && sim!==currentSIM) continue;

html+=`<div class="sectionTitle">${sim}</div>`;

for(let pack in offers[sim]){
html+=`<div class="sectionTitle">${pack}</div><div class="grid">`;

offers[sim][pack].forEach((offer)=>{

let text=(offer.name+offer.price).toLowerCase();

if(text.includes(search)){
html+=`
<div class="box">
<p>${offer.name}</p>
<p class="price">${offer.price}৳</p>
<button onclick="buy('${offer.name}','${offer.price}')">Buy</button>
</div>
`;
}

});

html+=`</div>`;
}
}

document.getElementById("main").innerHTML=html;
}

/* ALL OFFERS */
function loadAllOffers(){
let html="";

for(let sim in offers){
for(let pack in offers[sim]){
offers[sim][pack].forEach((offer)=>{
html+=`
<div class="box">
<p>${offer.name}</p>
<p class="price">${offer.price}৳</p>
<button onclick="buy('${offer.name}','${offer.price}')">Buy</button>
</div>
`;
});
}
}

document.getElementById("allOffers").innerHTML=html;
}

loadAllOffers();

/* BEST */
function highlightBest(){
let boxes=document.querySelectorAll(".box");

boxes.forEach(box=>{
let price=parseInt(box.querySelector(".price").innerText);
if(price<=99){
box.classList.add("best");
}
});
}

setTimeout(highlightBest,500);

/* WhatsApp */
function buy(name,price){
let msg=`🛒 Order\n📦 ${name}\n💰 ${price}৳`;
window.open("https://wa.me/8801624228476?text="+encodeURIComponent(msg));
}

/* INITIAL LOAD */
renderOffers();

</script>

</body>
</html>
